name: Tests

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: windows-latest
    strategy:
      matrix:
        config: [debug, development, shipping]
        arch: [x64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
      - name: Setup Windows SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2
        with:
          sdk-version: 22621
      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: 3.0.1
      - name: Cache xmake dependencies
        uses: actions/cache@v4
        with:
          path: |
            .xmake
            ~/.xmake
          key: xmake-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.config }}-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.config }}-
            xmake-${{ runner.os }}-${{ matrix.arch }}-
            xmake-${{ runner.os }}-
      - name: Configure xmake
        run: |
          xmake f -p windows -a ${{ matrix.arch }} -m ${{ matrix.config }} --yes
      - name: Install Dependencies
        run: xmake require --yes
      - name: Build Solution
        run: xmake build
      - name: Run Unit Tests
        run: |
          cd Binaries/Engine/windows-${{ matrix.arch }}/${{ matrix.config }}
          ./EngineTests.exe
      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-${{ matrix.config }}-${{ matrix.arch }}
          path: |
            Binaries/Engine/windows-${{ matrix.arch }}/${{ matrix.config }}/TestResults.xml
          retention-days: 7
